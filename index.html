<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Algamol Research Library</title>
<style>
:root{
  --bg:#0d1117;--s1:#161b27;--s2:#1c2333;--brd:rgba(255,255,255,.08);
  --tx:#e6edf3;--mu:#7d8590;--ac:#4493f8;--green:#22c55e;--r:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--tx);min-height:100vh}

/* HEADER */
.hdr{background:linear-gradient(150deg,#0c1a38,#0d1117 60%,#190c30);
  border-bottom:1px solid var(--brd);padding:24px 40px 20px;position:sticky;top:0;z-index:100}
.hi{max-width:1300px;margin:0 auto}
.htop{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.lg{width:40px;height:40px;border-radius:9px;background:linear-gradient(135deg,#22c55e,#3b82f6);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.t1{font-size:20px;font-weight:700;color:#fff}
.t2{font-size:11.5px;color:var(--mu);margin-top:2px}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.stat{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  border-radius:14px;padding:3px 11px;font-size:11px;font-weight:600;color:var(--mu)}
.stat b{color:var(--tx)}

/* SEARCH BAR */
.sbar{display:flex;gap:10px;align-items:center}
.sw{flex:1;position:relative;max-width:700px}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--mu);font-size:15px;pointer-events:none}
#srch{width:100%;padding:11px 12px 11px 38px;background:#090d14;
  border:1.5px solid var(--brd);border-radius:8px;color:var(--tx);
  font-size:14px;outline:none;transition:border-color .15s}
#srch:focus{border-color:var(--ac)}
#srch::placeholder{color:var(--mu)}
#clr{display:none;padding:9px 18px;background:rgba(255,255,255,.06);
  border:1px solid var(--brd);border-radius:8px;color:var(--tx);
  font-size:13px;cursor:pointer;white-space:nowrap}
#clr:hover{background:rgba(255,255,255,.1)}
#rcount{font-size:12px;color:var(--mu);white-space:nowrap}

/* MAIN */
.main{max-width:1300px;margin:0 auto;padding:30px 40px}

/* BROWSE VIEW */
.bv-title{font-size:13px;font-weight:600;color:var(--mu);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}
.cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:40px}
.cat{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);
  padding:16px 18px;cursor:pointer;transition:border-color .15s,background .15s}
.cat:hover{border-color:rgba(68,147,248,.4);background:var(--s2)}
.cat-ic{font-size:22px;margin-bottom:8px}
.cat-nm{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:3px}
.cat-ct{font-size:12px;color:var(--mu)}

/* SECTION */
.sec{margin-bottom:10px;border:1px solid var(--brd);border-radius:var(--r);overflow:hidden}
.sh{display:flex;align-items:center;gap:10px;padding:14px 18px;
  background:var(--s1);cursor:pointer;user-select:none;transition:background .15s}
.sh:hover{background:var(--s2)}
.sic{font-size:18px}
.stt{font-size:14px;font-weight:600;flex:1}
.scn{font-size:12px;color:var(--mu);background:rgba(255,255,255,.06);
  border-radius:10px;padding:2px 9px}
.cv{font-size:11px;color:var(--mu);transition:transform .2s}
.cv.op{transform:rotate(180deg)}
.sb{display:none;flex-direction:column}
.sb.op{display:flex}

/* FILE ROW */
.fi{display:flex;align-items:center;gap:10px;padding:10px 18px;
  text-decoration:none;color:var(--tx);border-top:1px solid var(--brd);
  transition:background .1s}
.fi:hover{background:rgba(255,255,255,.03)}
.bdg{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;
  flex-shrink:0;text-transform:uppercase;letter-spacing:.03em;width:38px;text-align:center}
.fn{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fsz{font-size:11px;color:var(--mu);flex-shrink:0}
.ob{font-size:11px;color:var(--ac);flex-shrink:0;opacity:0}
.fi:hover .ob{opacity:1}

/* SEARCH RESULTS VIEW */
#sv{display:none}
.sv-hdr{margin-bottom:20px}
.sv-label{font-size:13px;color:var(--mu);margin-bottom:4px}
.sv-query{font-size:22px;font-weight:700;color:#fff}

.results{display:flex;flex-direction:column;gap:8px}
.rcard{display:flex;align-items:center;gap:14px;padding:14px 18px;
  background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);
  text-decoration:none;color:var(--tx);transition:border-color .15s,background .15s}
.rcard:hover{border-color:rgba(68,147,248,.5);background:var(--s2)}
.hits{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:60px;background:rgba(68,147,248,.12);border:1px solid rgba(68,147,248,.25);
  border-radius:8px;padding:8px 10px;flex-shrink:0}
.hits-n{font-size:22px;font-weight:800;color:var(--ac);line-height:1}
.hits-l{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.rinfo{flex:1;min-width:0}
.rname{font-size:14px;font-weight:600;margin-bottom:4px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rmeta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.rcat{font-size:11px;color:var(--mu);background:rgba(255,255,255,.06);
  border-radius:10px;padding:2px 9px}
.rdl{font-size:12px;color:var(--ac);flex-shrink:0;padding:7px 16px;
  background:rgba(68,147,248,.1);border:1px solid rgba(68,147,248,.2);
  border-radius:6px;white-space:nowrap}
.rcard:hover .rdl{background:rgba(68,147,248,.2)}

/* LOADING */
#loading{text-align:center;padding:60px 20px;color:var(--mu)}
.spin{display:inline-block;width:28px;height:28px;border:3px solid var(--brd);
  border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--mu)}
.empty-ic{font-size:40px;margin-bottom:12px}
.empty-t{font-size:16px;color:var(--tx);margin-bottom:6px}

@media(max-width:700px){
  .hdr{padding:16px 16px 14px}
  .main{padding:20px 16px}
  .hits-n{font-size:18px}
  .rname{font-size:13px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hi">
    <div class="htop">
      <div class="lg">🧬</div>
      <div>
        <div class="t1">Algamol Research Library</div>
        <div class="t2" id="t2">Loading index…</div>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="sbar">
      <div class="sw">
        <span class="si">🔍</span>
        <input type="text" id="srch" placeholder="Search all files — try 'leaching', 'DFARS', 'microalgae'…"
               oninput="onSearch(this.value)" autocomplete="off" disabled>
      </div>
      <button id="clr" onclick="clearSearch()">✕ Clear</button>
      <span id="rcount"></span>
    </div>
  </div>
</div>

<div class="main">
  <div id="loading">
    <div class="spin"></div><br>Loading full-text index…
  </div>

  <!-- BROWSE VIEW -->
  <div id="bv" style="display:none">
    <div class="bv-title">Browse by category</div>
    <div class="cats" id="cats"></div>
    <div id="secs"></div>
  </div>

  <!-- SEARCH RESULTS VIEW -->
  <div id="sv">
    <div class="sv-hdr">
      <div class="sv-label">Search results for</div>
      <div class="sv-query" id="sq"></div>
    </div>
    <div class="results" id="results"></div>
  </div>
</div>

<script>
const REPO = 'https://raw.githubusercontent.com/yair-alg/algamol-elicit-research/main';
const CAT_ICONS = {
  'Defense & DFARS':'🛡️',
  'NdFeB Leachate Lab & Experimental Research':'🔬',
  'NdFeB Magnet Waste Engineering & Treatment':'⚙️',
  'REE Recovery Technology & Market':'⛏️',
  'Competitive Landscape & Market Intelligence':'📊',
  'Biosorption & Microalgae Core Science':'🌿',
  'LCA, Economics & Regulatory':'💰',
  'Raw Data Extracts':'📋',
  'Reference, Index & Prompts':'📚',
  'Retinal Research (Non-Algamol)':'👁️',
  'Other & Miscellaneous':'📁',
};
const EXT_COLORS = {
  pdf:  {bg:'#3a1414', c:'#ef4444'},
  docx: {bg:'#14213a', c:'#60a5fa'},
  md:   {bg:'#1a2e1a', c:'#4ade80'},
  csv:  {bg:'#2a2014', c:'#fbbf24'},
  ris:  {bg:'#251428', c:'#c084fc'},
  bib:  {bg:'#142828', c:'#67e8f9'},
  txt:  {bg:'#1e1e1e', c:'#9ca3af'},
  xlsx: {bg:'#1a2e1a', c:'#86efac'},
};

let INDEX = [];
let searchTimeout = null;

// Load the full-text index
fetch('search-data.json')
  .then(r => r.json())
  .then(data => {
    INDEX = data;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('bv').style.display = 'block';
    document.getElementById('t2').textContent =
      `Elicit Collection · ${data.length} files · full-text indexed`;
    document.getElementById('srch').disabled = false;
    document.getElementById('srch').placeholder =
      "Search all files — try 'leaching', 'DFARS', 'microalgae'…";
    buildStats(data);
    buildBrowse(data);
  })
  .catch(e => {
    document.getElementById('loading').innerHTML =
      '<div class="empty"><div class="empty-ic">⚠️</div>' +
      '<div class="empty-t">Could not load search index</div>' +
      '<div>' + e + '</div></div>';
  });

function buildStats(data) {
  const exts = {};
  data.forEach(r => { exts[r.ext] = (exts[r.ext]||0) + 1; });
  const html = Object.entries(exts)
    .sort((a,b)=>b[1]-a[1])
    .map(([e,n]) => `<div class="stat">${e.toUpperCase()} <b>${n}</b></div>`)
    .join('') + `<div class="stat">Total <b>${data.length}</b></div>`;
  document.getElementById('stats').innerHTML = html;
}

function buildBrowse(data) {
  const bycat = {};
  data.forEach(r => {
    if (!bycat[r.cat]) bycat[r.cat] = [];
    bycat[r.cat].push(r);
  });

  // Category cards
  const catsEl = document.getElementById('cats');
  catsEl.innerHTML = Object.entries(bycat).map(([cat, files]) => `
    <div class="cat" onclick="scrollToSec('${cat}')">
      <div class="cat-ic">${CAT_ICONS[cat]||'📁'}</div>
      <div class="cat-nm">${cat}</div>
      <div class="cat-ct">${files.length} files</div>
    </div>`).join('');

  // Sections
  const secsEl = document.getElementById('secs');
  secsEl.innerHTML = Object.entries(bycat).map(([cat, files]) => {
    const secId = 'sec-' + cat.replace(/[^a-z0-9]/gi,'_');
    const rows = files.map(r => fileRow(r)).join('');
    return `<div class="sec" id="${secId}">
      <div class="sh" onclick="tog(this)">
        <span class="sic">${CAT_ICONS[cat]||'📁'}</span>
        <span class="stt">${cat}</span>
        <span class="scn">${files.length} files</span>
        <span class="cv op">▼</span>
      </div>
      <div class="sb op">${rows}</div>
    </div>`;
  }).join('');
}

function fileRow(r) {
  const ec = EXT_COLORS[r.ext] || {bg:'#1e1e1e',c:'#9ca3af'};
  const sz = r.size > 1048576 ? (r.size/1048576).toFixed(1)+' MB'
           : r.size > 1024    ? Math.round(r.size/1024)+' KB'
           : r.size+' B';
  return `<a class="fi" href="${r.url}" target="_blank">
    <span class="bdg" style="background:${ec.bg};color:${ec.c}">${r.ext.toUpperCase()}</span>
    <span class="fn" title="${r.name}">${r.name}</span>
    <span class="fsz">${sz}</span>
    <span class="ob">Open ↗</span>
  </a>`;
}

function scrollToSec(cat) {
  const id = 'sec-' + cat.replace(/[^a-z0-9]/gi,'_');
  const el = document.getElementById(id);
  if (el) { el.scrollIntoView({behavior:'smooth',block:'start'}); }
}

function tog(h) {
  const body = h.nextElementSibling;
  const arrow = h.querySelector('.cv');
  const open = body.classList.contains('op');
  body.classList.toggle('op', !open);
  arrow.classList.toggle('op', !open);
}

// SEARCH
function onSearch(val) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => doSearch(val.trim()), 120);
}

function doSearch(q) {
  const bv = document.getElementById('bv');
  const sv = document.getElementById('sv');
  const clr = document.getElementById('clr');
  const rcount = document.getElementById('rcount');

  if (!q) {
    sv.style.display = 'none';
    bv.style.display = 'block';
    clr.style.display = 'none';
    rcount.textContent = '';
    return;
  }

  bv.style.display = 'none';
  sv.style.display = 'block';
  clr.style.display = 'inline-block';
  document.getElementById('sq').textContent = '"' + q + '"';

  // Build results: count occurrences (case-insensitive) in name + text
  const qLow = q.toLowerCase();
  const words = qLow.split(/\s+/).filter(Boolean);

  const scored = [];
  INDEX.forEach(r => {
    const combined = (r.name + ' ' + r.text).toLowerCase();
    // Count total occurrences of all query words
    let total = 0;
    words.forEach(w => {
      let pos = 0, count = 0;
      while ((pos = combined.indexOf(w, pos)) !== -1) { count++; pos += w.length; }
      total += count;
    });
    if (total > 0) scored.push({r, total});
  });

  // Sort by hit count descending
  scored.sort((a, b) => b.total - a.total);

  rcount.textContent = scored.length
    ? `${scored.length} file${scored.length===1?'':'s'} found`
    : '';

  const resultsEl = document.getElementById('results');
  if (scored.length === 0) {
    resultsEl.innerHTML = `<div class="empty">
      <div class="empty-ic">🔎</div>
      <div class="empty-t">No files contain "${q}"</div>
      <div>Try a different keyword</div>
    </div>`;
    return;
  }

  resultsEl.innerHTML = scored.map(({r, total}) => {
    const ec = EXT_COLORS[r.ext] || {bg:'#1e1e1e',c:'#9ca3af'};
    const sz = r.size > 1048576 ? (r.size/1048576).toFixed(1)+' MB'
             : r.size > 1024    ? Math.round(r.size/1024)+' KB'
             : r.size+' B';
    return `<a class="rcard" href="${r.url}" target="_blank">
      <div class="hits">
        <div class="hits-n">${total}</div>
        <div class="hits-l">hits</div>
      </div>
      <div class="rinfo">
        <div class="rname">${r.name}</div>
        <div class="rmeta">
          <span class="bdg" style="background:${ec.bg};color:${ec.c}">${r.ext.toUpperCase()}</span>
          <span class="rcat">${r.cat}</span>
          <span style="font-size:11px;color:var(--mu)">${sz}</span>
        </div>
      </div>
      <div class="rdl">Open ↗</div>
    </a>`;
  }).join('');
}

function clearSearch() {
  document.getElementById('srch').value = '';
  doSearch('');
  document.getElementById('srch').focus();
}
</script>
</body>
</html>
